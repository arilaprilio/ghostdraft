<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostDraft - Admin</title>
  <meta name="description" content="GhostDraft admin - manage paste sessions.">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="stylesheet" href="/css/inter-ui.css">
  <link rel="stylesheet" href="/css/fontello.css">
  <link rel="stylesheet" href="/assets/style.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body class="admin-body">
  <div class="app">
    <header class="header">
      <a title="Home" href="/" id="home" class="btn btn-inverse"><i class="icon-home icon-large"></i></a>
      <span class="paste-title"><strong>GhostDraft Admin</strong></span>
      <div style="flex:1"></div>
      <button id="logoutBtn" class="btn hidden"><i class="icon-logout"></i> Logout</button>
      <a href="/" class="btn"><i class="icon-edit"></i> Editor</a>
    </header>
    <main>
      <!-- Login -->
      <div id="loginSection">
        <h2>Admin Login</h2>
        <form id="loginForm" autocomplete="off">
          <input type="email" id="email" placeholder="admin@example.com" required autocomplete="email">
          <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
          <button type="submit">Login</button>
        </form>
        <div id="loginError" class="hidden"></div>
      </div>

      <!-- Dashboard -->
      <div id="dashboardSection" class="hidden">
        <div id="draftsListContainer">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
            <h2 style="margin:0">All Drafts</h2>
            <span id="draftCount" style="font-size:9pt;color:#888"></span>
            <div style="flex:1"></div>
            <button id="selectAllBtn" class="btn btn-small">Select All</button>
            <button id="deleteSelectedBtn" class="btn btn-small hidden" style="background:#a33;background-image:linear-gradient(to bottom,#c44,#822)">Delete Selected (<span id="selectedCount">0</span>)</button>
          </div>
          <div id="draftsList"><p class="empty-state">Loading drafts…</p></div>
        </div>
        <div id="draftDetail" class="hidden">
          <div id="detailContent"></div>
          <button id="closeDetailBtn" class="btn" style="margin-top:16px">← Back to list</button>
        </div>
      </div>
    </main>
  </div>
  <script src="/assets/firebase-config.js"></script>
  <script src="/assets/admin.js"></script>
</body>
</html>
