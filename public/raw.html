<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Raw — GhostDraft</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<style>body{margin:0;padding:10px;background:#2a2a2a;color:#ebebeb;font:12pt/1.5 'EnvyCodeRWeb',monospace;white-space:pre-wrap;word-break:break-word;min-height:100vh}</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<!-- FIREBASE_CONFIG -->
<script src="/assets/ghostdraft.js"></script></head><body>
<script>
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var parts = location.pathname.split('/').filter(Boolean);
var id = parts.length >= 2 ? parts[1] : null;
if (!id) {
  document.body.textContent = 'No session ID.';
} else {
  db.ref('drafts/' + id).once('value').then(function(snap){
    var data = snap.val();
    if (data && typeof data.content === 'string') {
      document.body.textContent = gdDecode(data.content);
    } else {
      document.body.textContent = 'Draft tidak ditemukan.';
    }
  }).catch(function(err){
    document.body.textContent = 'Error: ' + err.message;
  });
}
</script></body></html>
